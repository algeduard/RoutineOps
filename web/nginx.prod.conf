# Значение заголовка Connection для проксируемого WebSocket: "upgrade" при наличии
# Upgrade-заголовка (WS-хендшейк), иначе "close". Нужно для эндпоинта удалённого
# рабочего стола (bidi WebSocket). map — в http-контексте (conf.d включается в http{}).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    # Бинари агента раздаём и по HTTP: они публичны, а инсталлятор сверяет sha256-пин
    # (getInstaller). Это позволяет скачать агент на дефолтном IP/self-signed деплое,
    # где Invoke-WebRequest/curl отвергают непроверяемый серверный сертификат. Канал
    # enroll (ca.crt по -ca-sha256 + gRPC/mTLS) остаётся защищённым.
    location /downloads/ {
        proxy_pass https://server:8081;
        proxy_ssl_verify off;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval';" always;

    # Удалённый рабочий стол — долгоживущий WebSocket (кадры экрана ↑, ввод ↓).
    # Regex-location приоритетнее префиксного /api/, поэтому WS-путь ловится здесь:
    # HTTP/1.1 + Upgrade/Connection для апгрейда, увеличенные таймауты (сеанс идёт
    # минуты/часы), buffering off (кадры отдаём сразу, без накопления).
    location ~ ^/api/v1/devices/[^/]+/remote-desktop$ {
        proxy_pass https://server:8081;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location /api/ {
        proxy_pass https://server:8081;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ca.crt {
        proxy_pass https://server:8081;
        proxy_ssl_verify off;
    }

    location /api/v1/installer {
        proxy_pass https://server:8081;
        proxy_ssl_verify off;
    }

    location /downloads/ {
        proxy_pass https://server:8081;
        proxy_ssl_verify off;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
}