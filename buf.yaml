# Конфиг buf для proto-контракта (модуль в proto/).
#
# Назначение — ГЕЙТ СОВМЕСТИМОСТИ: CI-джоба `proto · buf breaking` сравнивает
# proto в PR с веткой main и валит сборку при ломающем контракт изменении.
# Это автоматизирует ADR-4 (см. proto/agent.proto): поле нельзя удалять/менять
# номер/тип, изменения — только аддитивные, т.к. в проде из-за самообновления
# одновременно работают разные версии агента.
#
# Кодоген по-прежнему через protoc (`make proto`); buf используется только для
# проверки контракта.
version: v2

modules:
  - path: proto

# Категория FILE — самая строгая проверка обратной совместимости на уровне
# wire+генерируемого кода: ловит удаление/переименование полей и сообщений,
# смену номеров и типов, удаление RPC. Ровно то, что запрещает ADR-4.
breaking:
  use:
    - FILE
