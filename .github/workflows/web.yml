name: web

on:
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web.yml"

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # npm install (не ci): lockfile ещё не содержит vitest; после первого
      # локального npm install + коммита package-lock можно перейти на npm ci.
      - name: Install deps
        run: npm install --no-audit --no-fund
      # Главный гейт: tsc -b (типы) + vite build (сборка).
      - name: Typecheck + build
        run: npm run build
      - name: Unit tests
        run: npm test
      # Lint информативный — не блокируем PR на возможном существующем lint-долге.
      - name: Lint
        run: npm run lint
        continue-on-error: true
