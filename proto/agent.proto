syntax = "proto3";

package routineops;

option go_package = "github.com/Floodww/RoutineOps/proto";

// =============================================================================
// АРХИТЕКТУРНЫЕ РЕШЕНИЯ (зафиксированы)
// =============================================================================
//
// [ADR-1] Идентификация агента — только по mTLS-сертификату.
//   device_id ОТСУТСТВУЕТ в сообщениях agent→server. Сервер определяет
//   device_id из отпечатка сертификата TLS-соединения. Это единственный
//   источник истины. Доверять полю из тела сообщения нельзя — скомпрометированный
//   агент мог бы подставить чужой device_id.
//
// [ADR-4] Правила версионирования контракта.
//   Агент поддерживает самообновление — в проде одновременно могут работать
//   разные версии агента. Обязательные правила при изменении .proto:
//     - Никогда не менять номер существующего поля;
//     - Никогда не удалять поле — только пометить deprecated, потом reserved;
//     - Новые поля добавлять только в конец;
//     - Никогда не переиспользовать освободившиеся номера (для этого — reserved).
//
// [ADR-5] Граница heartbeat vs инвентаризация.
//   Connect-стрим: ТОЛЬКО факт "я живой" + текущий IP. Часто, дёшево.
//   ReportInventory: полные данные (железо, ПО, процессы, пользователи).
//   Редко, по таймеру. Никогда не смешивать эти потоки.
//
// =============================================================================

// ====== Heartbeat ======
// Агент → Сервер. device_id не передаётся — сервер берёт его из mTLS-сертификата.

message HeartbeatRequest {
  reserved 1;           // было device_id — удалено по ADR-1
  reserved "device_id";
  string ip_address = 2;
  int64 timestamp = 3;
}

// ====== Инвентаризация устройства ======
// Агент → Сервер. Отдельный вызов, редкий. См. ADR-5.

message DeviceInfo {
  reserved 1;           // было device_id — удалено по ADR-1
  reserved "device_id";
  string hostname = 2;
  string os = 3;
  string os_version = 4;
  string cpu = 5;
  int64 ram = 6;
  string disk = 7;
  string ip_address = 8;
  string mac_address = 9;
  string serial_number = 10;
  string agent_version = 11; // версия агентского бинаря (ldflags main.version) — для видимости раскатки

  // Расширение инвентаря (2026-07). Общий принцип: недоступное на данной ОС
  // значение — ПУСТАЯ строка / 0 («не знаю»), а не выдуманный false — поэтому
  // трёхзначные признаки едут строкой "true"/"false"/"", а не proto3-bool,
  // который не отличает false от «не собрано».
  string arch            = 12; // архитектура CPU: amd64 / arm64 (runtime.GOARCH)
  string console_user    = 13; // кто сейчас за консолью; Windows — DOMAIN\user
                               // (домен сохранён: только по нему учётка матчится
                               // с каталогом); "" = за консолью никого
  string disk_encryption = 14; // системный том: "enabled"/"disabled"/"" (unknown).
                               // macOS FileVault / Windows BitLocker / Linux LUKS
  string os_patch_date   = 15; // дата последнего установленного обновления ОС,
                               // ISO "2006-01-02"; "" = неизвестно (Linux: нет
                               // универсального сигнала — всегда "")
  int64  boot_time       = 16; // unix-время загрузки ОС; 0 = неизвестно. Именно
                               // момент загрузки, а не uptime: uptime менялся бы
                               // в каждом отчёте и убил бы delta-подавление
  string disk_free       = 17; // свободно на системном томе, человекочитаемо
  string domain_joined   = 18; // "true"/"false"/""; Windows — Win32_ComputerSystem
                               // .PartOfDomain, macOS/Linux — заведомое "false"
  string tpm             = 19; // TPM присутствует: "true"/"false"/"" — Windows
  string secure_boot     = 20; // Secure Boot включён: "true"/"false"/"" — Windows
                               // (legacy BIOS = "false": UEFI-защиты заведомо нет)
}

message SoftwareItem {
  string software_name = 1;
  string version = 2;
}

message InventoryReport {
  reserved 1;           // было device_id — удалено по ADR-1
  reserved "device_id";
  DeviceInfo device_info = 2;
  repeated SoftwareItem software = 3;
}

message InventoryAck {
  bool received = 1;
}

// ====== Задачи (Command Listener) ======

enum TaskPriority {
  TASK_PRIORITY_UNSPECIFIED = 0;
  TASK_PRIORITY_LOW = 1;
  TASK_PRIORITY_MEDIUM = 2;
  TASK_PRIORITY_HIGH = 3;
}

// Сервер → Агент.
message Task {
  string task_id = 1;
  reserved 2;           // было device_id — удалено по ADR-1
  reserved "device_id";
  string script_content = 3;
  string platform = 4;  // macOS / Windows
  TaskPriority priority = 5;
  LockCommand lock = 6; // если задано — это команда блокировки устройства, а не скрипт
  DecommissionCommand decommission = 7; // если задано — полное самоудаление агента, а не скрипт/лок
  RemoteDesktopCommand remote_desktop = 8; // если задано — команда сессии удалённого рабочего стола
  RemoveSoftwareCommand remove_software = 9; // если задано — тихая деинсталляция ПО (enterprise)
}

// RemoteDesktopCommand — управление сессией удалённого рабочего стола. Едет в Task
// поверх Connect-стрима (переиспользует доставку/дедуп). session_id генерирует
// СЕРВЕР при открытии WebSocket админом; агент-хелпер возвращает его в RDHello,
// чем сервер связывает конкретный браузер с конкретным стримом хелпера. Захват
// экрана/ввод возможны только в интерактивной сессии, поэтому служба (session 0)
// на START запускает отдельный процесс-хелпер (winsession.LaunchInActiveSession),
// а тот открывает bidi-RPC RemoteDesktop. См. docs/remote-desktop-design.md.
message RemoteDesktopCommand {
  string session_id = 1;          // выдан сервером; хелпер вернёт его в RDHello
  RemoteDesktopAction action = 2; // START / STOP
  // unattended (аддитивно, ADR-4): сервер сообщает, что для ЭТОЙ сессии на ЭТОМ
  // устройстве включён opt-in unattended-доступ (devices.rd_unattended). Тогда
  // хелпер ПРОПУСКАЕТ запрос согласия пользователя, но плашка «идёт сеанс» и аудит
  // старта/стопа ОСТАЮТСЯ (unattended снимает подтверждение, не видимость). DEFAULT
  // false: обычный attended-поток (запрос согласия) сохраняется, пока устройство
  // явно не opt-in — consent НИКОГДА не пропускается для не-opt-in устройства.
  bool unattended = 3;
}
enum RemoteDesktopAction {
  REMOTE_DESKTOP_ACTION_UNSPECIFIED = 0;
  REMOTE_DESKTOP_ACTION_START       = 1;
  REMOTE_DESKTOP_ACTION_STOP        = 2;
}

// DecommissionCommand — вывод устройства из эксплуатации: агент сносит СЕБЯ
// целиком (служба, серт+ключ+CA, конфиг, состояние, бинарь). Едет в Task
// (переиспользует доставку/ack/идемпотентность). Порядок на агенте: агент
// ПОДТВЕРЖДАЕТ выполнение обычным ReportTaskResult (по task_id сервер знает, что
// это decommission-задача) ДО сноса серта — иначе отчитываться будет уже нечем;
// сервер по подтверждению помечает устройство списанным и ОТЗЫВАЕТ серт.
//
// КРИТИЧНО (серверная сторона): пока серт жив, агент шлёт heartbeat, а
// сервер на неизвестный отпечаток СОЗДАЁТ устройство заново (UpsertDeviceHeartbeat)
// — недоснесённый агент воскресил бы списанную машину. Поэтому сервер обязан
// отозвать серт И отказываться воскрешать списанные устройства. Агент со своей
// стороны немедленно прекращает heartbeat (выходит из рабочего цикла).
message DecommissionCommand {
  string request_id = 1; // id заявки (идемпотентность/аудит; сервер приравнивает к task_id)
  string reason     = 2; // причина списания (для аудита)
}

// RemoveSoftwareCommand — тихая деинсталляция установленного ПО (enterprise-фича «удаление
// ПО из интерфейса»). Едет в Task поверх Connect-стрима (переиспользует доставку/ack/
// идемпотентность, как lock/decommission). Агент ищет продукт в реестре Uninstall по
// DisplayName (== name), берёт QuietUninstallString (иначе UninstallString) и запускает
// его тихо; результат — обычным ReportTaskResult (SUCCESS/ERROR по коду выхода). name —
// точное DisplayName из инвентаря (ReportInventory), version — для сверки/аудита.
message RemoveSoftwareCommand {
  string request_id = 1; // id заявки (= task_id; идемпотентность/аудит)
  string name       = 2; // точное DisplayName продукта (как в инвентаре)
  string version    = 3;  // версия из инвентаря (сверка/аудит; агент матчит по name)
}

// LockCommand — блокировка/разблокировка машины сотрудника (нарушение ИБ/увольнение:
// запереть ноут, пока не сдаст). Едет в Task поверх Connect-стрима: при заданном
// Task.lock агент обрабатывает блокировку вместо запуска скрипта (переиспользуя
// доставку/ack/идемпотентность задач). Разблокировка ОФФЛАЙН: сервер шлёт
// bcrypt-ХЕШ пароля (не плейнтекст), агент сверяет введённый пароль локально;
// плейнтекст показывается только в админке.
message LockCommand {
  string request_id    = 1; // id заявки (идемпотентность/отчёт)
  bool   unlock        = 2; // true → разблокировать; false → заблокировать
  string password_hash = 3; // bcrypt-хеш пароля разблокировки (только при блокировке)
  string reason        = 4; // текст для сотрудника на экране замка
  // FileVault-лок (enterprise). FAIL-SAFE: 0/unknown => OVERLAY (легаси/дефолт);
  // деструктив требует ЯВНОГО LOCK_MODE_FILEVAULT=2.
  LockMode        lock_mode              = 5; // 0/UNSPECIFIED => OVERLAY
  repeated string filevault_target_users = 6; // RecordName; пусто => целевых определяет агент
  // поле 7 свободно
}

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_SUCCESS = 1;
  TASK_STATUS_ERROR = 2;
}

// Агент → Сервер.
message TaskResult {
  string task_id = 1;
  reserved 2;           // было device_id — удалено по ADR-1
  reserved "device_id";
  TaskStatus status = 3;
  string error_log = 4; // заполняется только если status = ERROR
  string output = 5;    // stdout скрипта
}

message TaskResultAck {
  bool received = 1;
}

// Агент → Сервер. Подтверждение доставки задачи — ОТДЕЛЬНО от результата
// выполнения. Позволяет серверу отличить "не доставлено" от "доставлено,
// но не выполнено". Агент ОБЯЗАН обрабатывать повторные доставки идемпотентно
// (Asynq даёт at-least-once; особенно критично для операций выдачи прав).
message TaskReceivedAck {
  string task_id = 1;
  reserved 2;           // было device_id — удалено по ADR-1
  reserved "device_id";
  int64 received_at = 3;
}

message TaskReceivedAckResponse {
  bool acknowledged = 1;
}

// ====== Алерты ИБ (Security Monitor) ======

enum AlertType {
  ALERT_TYPE_UNSPECIFIED = 0;
  ALERT_TYPE_FORBIDDEN_SOFTWARE = 1;
  ALERT_TYPE_UNAUTHORIZED_INSTALL = 2;
  ALERT_TYPE_UNAUTHORIZED_SETTINGS_CHANGE = 3;
}

// Агент → Сервер.
message SecurityEvent {
  reserved 1;           // было device_id — удалено по ADR-1
  reserved "device_id";
  AlertType alert_type = 2;
  string details = 3;
  int64 occurred_at = 4;
  string admin_access_request_id = 5; // опционально, если событие во время активной админки
}

message SecurityEventAck {
  bool received = 1;
}

// ====== Политики ПО (Software Policy) ======
// Общий контракт (ADR-4).
//
// Агент периодически запрашивает действующие правила ПО (разрешено/запрещено),
// кэширует их локально в файл и применяет в Security Monitor даже без связи с
// сервером (CONTEXT §7). device_id не передаётся — сервер определяет устройство
// по mTLS-сертификату (ADR-1) и возвращает правила для него: глобальные
// (software_policy_rules.device_id IS NULL) + переопределения этого устройства.

enum PolicyRuleType {
  POLICY_RULE_TYPE_UNSPECIFIED = 0;
  POLICY_RULE_TYPE_ALLOWED = 1;
  POLICY_RULE_TYPE_FORBIDDEN = 2;
}

message SoftwarePolicyRule {
  string software_name = 1;
  PolicyRuleType rule_type = 2;
}

// Агент → Сервер.
message FetchPolicyRequest {
  // Версия политики у агента — unix-время max(updated_at) набора правил. Если
  // равно серверной версии, сервер отвечает unchanged=true без списка. 0 = нет
  // кэша (вернуть полный набор).
  int64 known_version = 1;
}

// Сервер → Агент.
message FetchPolicyResponse {
  repeated SoftwarePolicyRule rules = 1;
  int64 version = 2;   // unix-время max(updated_at) текущего набора (для кэша)
  bool unchanged = 3;  // true => known_version актуальна, rules не возвращены
}

// ====== Временные права администратора (Этап 4) ======
// Общий контракт (ADR-4).
//
// Флоу: сотрудник на устройстве запрашивает временные админ-права
// (RequestAdminAccess) → IT-админ одобряет/отклоняет в веб-интерфейсе (это REST
// web→server: POST /api/v1/admin-access-requests/{id}/respond, НЕ в этом proto) →
// агент узнаёт решение и срок (FetchAdminStatus, pull, как FetchPolicy) → агент
// применяет права и сообщает факт применения/сброса (ReportAdminAccess; напр.
// сброс при логауте → revoked_at). Длительность задаёт сервер по политике
// (system_settings/роль), возвращает готовый expires_at. device_id во всех
// сообщениях НЕ передаётся — сервер берёт из mTLS-серта (ADR-1). Маппится на
// таблицу admin_access_requests.

enum AdminAccessStatus {
  ADMIN_ACCESS_STATUS_UNSPECIFIED = 0;
  ADMIN_ACCESS_STATUS_PENDING     = 1; // заявка создана, ждёт решения IT-админа
  ADMIN_ACCESS_STATUS_APPROVED    = 2; // одобрено, права действуют до expires_at
  ADMIN_ACCESS_STATUS_REJECTED    = 3;
  ADMIN_ACCESS_STATUS_EXPIRED     = 4; // истёк срок (pending_expires_at или expires_at)
  ADMIN_ACCESS_STATUS_REVOKED     = 5; // снято (логаут пользователя или вручную)
}

// Агент → Сервер: сотрудник на устройстве запросил временные права.
message RequestAdminAccessRequest {
  string reason       = 1; // обоснование от пользователя
  int64  requested_at = 2;
}
message RequestAdminAccessResponse {
  string request_id = 1;        // admin_access_requests.id
  AdminAccessStatus status = 2; // обычно PENDING
}

// Агент → Сервер: узнать текущий статус прав для устройства (pull).
// Возвращает ПОСЛЕДНЮЮ активную заявку устройства (PENDING или APPROVED). Если
// активной заявки нет — request_id="" и status=ADMIN_ACCESS_STATUS_UNSPECIFIED.
// Несколько одновременно активных заявок недопустимы — это ответственность
// сервера; агент всегда видит ровно одну.
message FetchAdminStatusRequest {}
message FetchAdminStatusResponse {
  string request_id = 1;        // "" если активной заявки нет
  AdminAccessStatus status = 2; // UNSPECIFIED если активной заявки нет
  int64 granted_at = 3;         // когда права выданы (если APPROVED)
  int64 expires_at = 4;         // до когда действуют
}

// Агент → Сервер: агент сообщает фактическое применение/снятие прав
// (напр. сброс при логауте — сервер проставит revoked_at).
message ReportAdminAccessRequest {
  string request_id = 1;
  AdminAccessStatus status = 2; // APPROVED (применено) / REVOKED (снято)
  int64  occurred_at = 3;
  string details = 4; // напр. "revoked on user logout"
  // Дельта инвентаря ПО за сессию админ-прав. Заполняется ТОЛЬКО на REVOKED:
  // агент снимает снапшот ПО на выдаче прав (baseline) и на снятии, diff даёт что
  // установлено/удалено, пока у пользователя были админ-права. Аудит JIT-доступа.
  repeated SoftwareItem software_added   = 5;
  repeated SoftwareItem software_removed = 6;
}
message ReportAdminAccessResponse {
  bool received = 1;
}

// ====== Скрипт-политики (Этап 5) — общий контракт ======
// Аналог FetchPolicy, но для исполняемых скрипт-политик с триггерами.
//
// Предлагаемый флоу: IT-админ в вебе создаёт скрипты и привязывает их к
// устройствам/группам (REST: /api/v1/scripts, /api/v1/script-policies,
// /api/v1/device-groups — НЕ в этом proto). Агент периодически тянет СВОЙ
// эффективный набор скрипт-политик (FetchScriptPolicies, pull, как FetchPolicy),
// кэширует и исполняет по триггеру (cron / событие / on_connect), затем шлёт
// результат (ReportScriptResult, через устойчивую очередь — терять нельзя).
// device_id не передаётся — сервер резолвит устройство по mTLS-серту (ADR-1) и
// САМ вычисляет эффективные политики: прямые привязки устройства + привязки его
// групп. Агент в членство групп не лезет.
//
// РЕШЕНИЯ по обсуждавшимся вопросам:
//   1) script_content — inline (RMM-скрипты небольшие; лимит gRPC 4МБ с запасом;
//      при изменении не перетягивается лишний раз благодаря version/unchanged).
//   2) Эффективный набор резолвит СЕРВЕР по mTLS-серту (ADR-1): прямые привязки
//      устройства + привязки его групп. Агент группы/членство не видит.
//   3) Отдельный ReportScriptResult (у скрипт-политик нет task_id; есть policy_id
//      + run_id, отдельные stdout/stderr и метки времени запуска).
//   4) event_trigger — enum ScriptEventType (фикс-набор), расширяется аддитивно.
//   5) on_connect — запуск на установку стрима, дедуп по policy_id+version
//      (персистентно у агента), реконнекты не перезапускают скрипт.

enum ScriptTrigger {
  SCRIPT_TRIGGER_UNSPECIFIED = 0;
  SCRIPT_TRIGGER_SCHEDULE    = 1; // по cron-выражению (поле cron)
  SCRIPT_TRIGGER_EVENT       = 2; // по событию ОС (поле event_trigger)
  SCRIPT_TRIGGER_ON_CONNECT  = 3; // при установке Connect-стрима
}

// События ОС для trigger=EVENT. Расширять только в конец (ADR-4).
enum ScriptEventType {
  SCRIPT_EVENT_TYPE_UNSPECIFIED    = 0;
  SCRIPT_EVENT_TYPE_LOGIN          = 1;
  SCRIPT_EVENT_TYPE_LOGOUT         = 2;
  SCRIPT_EVENT_TYPE_NETWORK_CHANGE = 3;
}

message ScriptPolicy {
  string policy_id              = 1; // script_policies.id
  string name                   = 2;
  string script_content         = 3; // inline (решение 1)
  string interpreter            = 4; // "shell" | "powershell" | "python"
  ScriptTrigger trigger         = 5;
  string cron                   = 6; // при trigger=SCHEDULE, напр. "0 */6 * * *"
  ScriptEventType event_trigger = 7; // при trigger=EVENT (решение 4)
  int64  timeout_seconds        = 8; // потолок на один запуск
  int64  updated_at             = 9; // unix; max по набору = version
}

// Агент → Сервер: тянем эффективный набор скрипт-политик устройства.
message FetchScriptPoliciesRequest {
  // Версия у агента — unix max(updated_at) набора. Равна серверной → unchanged=true
  // без списка. 0 = нет кэша (вернуть полный набор).
  int64 known_version = 1;
}
message FetchScriptPoliciesResponse {
  repeated ScriptPolicy policies = 1;
  int64 version   = 2; // unix max(updated_at) текущего набора (для кэша)
  bool  unchanged = 3; // true => known_version актуальна, policies не возвращены
}

// Агент → Сервер: результат одного запуска скрипт-политики (через outbox).
message ScriptResult {
  string policy_id   = 1;
  string run_id      = 2; // идемпотентность запуска (uuid, генерит агент)
  int32  exit_code   = 3;
  string stdout      = 4;
  string stderr      = 5;
  int64  started_at  = 6;
  int64  finished_at = 7;
  ScriptTrigger trigger = 8; // чем был инициирован запуск
}
message ScriptResultAck {
  bool received = 1;
}

// ====== Сервис ======

// ── FileVault recovery-key escrow (enterprise) ──
// Эскроу recovery-ключа на энроллменте. Сервер хранит ТОЛЬКО непрозрачный
// шифртекст (sealed_key) и расшифровать его НЕ может; расшифровка — офлайн, вне
// сервера. Схема запечатывания и хранения приватного ключа — enterprise-деталь.
enum RecoveryKeyType {
  RECOVERY_KEY_TYPE_UNSPECIFIED       = 0;
  RECOVERY_KEY_TYPE_FILEVAULT_PRK     = 1;
  RECOVERY_KEY_TYPE_SECONDARY_CREDENTIAL = 2;
}
// device_id НЕ передаём (ADR-1: идентичность из mTLS-cert). sealed_key — bytes, НЕ
// string: никакого base64/армора на проводе, чтобы случайно не залогировать.
message EscrowRecoveryKeyRequest {
  string          request_id       = 1;
  RecoveryKeyType key_type         = 2;
  // Непрозрачный запечатанный ENVELOPE, НЕ сырой секрет. Формат plaintext и схема
  // запечатывания — enterprise-деталь (сервер расшифровать не может); envelope
  // самоверифицируется офлайн при reveal. bytes, НЕ string: никакого base64/армора
  // на проводе, чтобы случайно не залогировать.
  bytes           sealed_key       = 3;
  // fpr использованного recipient — сервер сверяет с pinned. Формула (канон):
  // fpr = hex(sha256(canonical recipient.String()))[:32] — реализация
  // internal/server/crypto.Fingerprint; агент ИМПОРТИТ её, не реализует сам.
  // recipient для Encrypt и fpr обязаны браться из ОДНОГО распарсенного объекта.
  string          escrow_pubkey_id = 4;
  int64           created_at       = 5;
}
message EscrowRecoveryKeyResponse {
  bool   stored    = 1; // true ТОЛЬКО после устойчивого DB COMMIT
  string escrow_id = 2;
}

// ====== Обращения за помощью (help requests) ======
// Флоу: сотрудник в трее «Сообщить о проблеме» → окно в юзер-сессии (текст +
// опциональный скриншот, снимается ТОЛЬКО по явному действию пользователя и
// показывается ему до отправки) → файл-заявка в общем каталоге (как
// admin-request.json) → служба подхватывает и шлёт SubmitHelpRequest (у трея
// нет mTLS-идентичности) → IT-админ видит обращение в вебе (REST
// /api/v1/help-requests, НЕ в этом proto) и закрывает его.
// device_id не передаётся — сервер берёт из mTLS-серта (ADR-1).
// Скриншот — уже сжатый JPEG (даунскейл на агенте, ≤ HELP_SCREENSHOT_MAX_BYTES
// серверной валидации 2МБ << лимита gRPC 4МБ). Маппится на таблицу help_requests.

message SubmitHelpRequestRequest {
  string message         = 1; // текст обращения от сотрудника
  bytes  screenshot_jpeg = 2; // опциональный скриншот (пусто = без скриншота)
  int64  created_at      = 3; // unix, момент создания заявки на устройстве
  string reporter        = 4; // логин консольного пользователя (кто нажал кнопку)
}
message SubmitHelpRequestResponse {
  string request_id = 1; // help_requests.id
}

// ====== Телеметрия устройств (Device Telemetry) ======
// Общий контракт (ADR-1/4/5). Агент сам собирает по таймеру и репортит (как
// inventory/security) — сервер НЕ пушит. device_id НЕ передаётся: сервер берёт
// его из mTLS-серта (ADR-1). Всё ниже — аддитивные message/RPC (ADR-4).
//
// Две подсистемы:
//   1) Метрики ресурсов (CPU/RAM/диск/сеть) — time-series, репортятся батчами.
//   2) Аналитика активности приложений и времени за ПК — суточные агрегаты,
//      ЧУВСТВИТЕЛЬНЫЕ данные, сбор выключаем флагом (privacy, см. дизайн-док
//      docs/device-telemetry-design.md).

// Один сэмпл ресурсов в момент ts. Метрики допустимо терять при обрыве (в отличие
// от прав/алертов) — идут прямым unary с ретраем, не через durable-outbox.
message ResourceSample {
  int64  ts                  = 1; // unix-время сэмпла (агентские часы; сервер клампит)
  double cpu_percent         = 2; // загрузка CPU, 0..100
  int64  mem_used_bytes      = 3; // использовано RAM, байт
  int64  mem_total_bytes     = 4; // всего RAM, байт
  double disk_percent        = 5; // загрузка СИСТЕМНОГО тома, 0..100
  int64  net_rx_bytes_per_sec = 6; // входящий трафик, байт/с (дельта счётчиков)
  int64  net_tx_bytes_per_sec = 7; // исходящий трафик, байт/с (дельта счётчиков)
}

// Агент → Сервер: батч сэмплов ресурсов, накопленных с прошлой отправки.
message ResourceMetricsReport {
  repeated ResourceSample samples = 1;
}
message ResourceMetricsAck {
  bool received = 1;
}

// Одна запись использования приложения за день (ДЕЛЬТА foreground-времени с
// прошлой отправки; сервер аккумулирует existing + delta).
message AppUsageEntry {
  string day                = 1; // локальный день устройства, ISO "2006-01-02"
  string app_name           = 2; // имя foreground-процесса (напр. "chrome.exe")
  int64  foreground_seconds = 3; // дельта секунд на переднем плане (при активном вводе)
  // Заголовок активного окна (напр. вкладка браузера) — грубо показывает, ЧЕМ занят
  // пользователь/на каком сайте. ЧУВСТВИТЕЛЬНО: собирается ТОЛЬКО при отдельном
  // серверном флаге capture_window_titles (отдельно от app_usage_enabled), иначе "".
  string window_title       = 4;
  // Полный URL активной вкладки браузера (напр. "https://example.com/page"), читается
  // через UI Automation. ЕЩЁ БОЛЕЕ ЧУВСТВИТЕЛЬНО, чем заголовок окна: собирается ТОЛЬКО
  // при ОТДЕЛЬНОМ серверном флаге capture_urls (строже capture_window_titles), только
  // из известных браузеров (Chrome/Edge/Firefox…) и не из инкогнито-окон по best-effort-
  // детекту приватного маркера в заголовке (та же эвристика, что у заголовков; основные
  // локали, при обрезанном заголовке — fail-closed). Иначе "".
  string url                = 5;
}

// Активное/простойное время за день (ДЕЛЬТА с прошлой отправки).
message DailyActivity {
  string day            = 1; // локальный день устройства, ISO "2006-01-02"
  int64  active_seconds = 2; // дельта секунд активности (ввод в пределах idle-порога)
  int64  idle_seconds   = 3; // дельта секунд простоя
}

// Агент → Сервер: агрегаты активности приложений и времени за ПК (дельты).
// Отправляется ТОЛЬКО при включённом сборе (FetchTelemetryConfig.app_usage_enabled).
message AppUsageReport {
  repeated AppUsageEntry apps = 1;
  repeated DailyActivity days = 2;
}
message AppUsageAck {
  bool received = 1;
}

// Агент → Сервер: pull-конфиг телеметрии для устройства (как FetchPolicy).
message FetchTelemetryConfigRequest {}
message FetchTelemetryConfigResponse {
  // Сбор аналитики приложений/времени за ПК включён для этого устройства.
  // Дефолт false (privacy): агент не собирает foreground/idle, пока не true.
  bool  app_usage_enabled     = 1;
  // Опциональный серверный оверрайд интервала сэмплирования ресурсов (секунды).
  // 0 = использовать агентский дефолт.
  int64 metrics_sample_seconds = 2;
  // Собирать заголовки активных окон (напр. вкладки браузера) в app-usage. ОТДЕЛЬНЫЙ
  // privacy-гейт (строже app_usage_enabled): дефолт false, включает только it_admin.
  bool  capture_window_titles = 3;
  // Собирать полные URL активных вкладок браузера в app-usage. САМЫЙ строгий privacy-
  // гейт (строже capture_window_titles): дефолт false, включает только it_admin с
  // аудитом. Приватные/инкогнито-окна исключаются по best-effort-детекту маркера в
  // заголовке (основные локали; при обрезанном заголовке — fail-closed), читается только
  // из известных браузеров через UI Automation.
  bool  capture_urls          = 4;
}

service AgentService {
  // Постоянный стрим: heartbeat → сервер, задачи ← сервер. (ADR-5)
  rpc Connect(stream HeartbeatRequest) returns (stream Task);

  // Подтверждение доставки задачи агенту (до выполнения).
  rpc AckTaskReceived(TaskReceivedAck) returns (TaskReceivedAckResponse);

  rpc ReportInventory(InventoryReport) returns (InventoryAck);
  rpc ReportTaskResult(TaskResult) returns (TaskResultAck);
  rpc ReportSecurityEvent(SecurityEvent) returns (SecurityEventAck);

  // Синхронизация политик ПО (запрещённое/разрешённое) для Security Monitor.
  // Pull: агент тянет при старте; версия — unix max(updated_at) (см. FetchPolicyResponse).
  rpc FetchPolicy(FetchPolicyRequest) returns (FetchPolicyResponse);

  // Временные права администратора (Этап 4). Одобрение IT-админом — через REST.
  rpc RequestAdminAccess(RequestAdminAccessRequest) returns (RequestAdminAccessResponse);
  rpc FetchAdminStatus(FetchAdminStatusRequest) returns (FetchAdminStatusResponse);
  rpc ReportAdminAccess(ReportAdminAccessRequest) returns (ReportAdminAccessResponse);

  // Обращение за помощью с устройства (текст + опциональный скриншот).
  // Закрытие IT-админом — через REST, как admin-access-requests.
  rpc SubmitHelpRequest(SubmitHelpRequestRequest) returns (SubmitHelpRequestResponse);

  // Скрипт-политики (Этап 5). Pull эффективного набора + отчёт о выполнении
  // (как FetchPolicy + ReportTaskResult).
  rpc FetchScriptPolicies(FetchScriptPoliciesRequest) returns (FetchScriptPoliciesResponse);
  rpc ReportScriptResult(ScriptResult) returns (ScriptResultAck);

  // Блокировка устройства: агент подтверждает применение/снятие (аудит + UI).
  rpc ReportLockStatus(ReportLockStatusRequest) returns (ReportLockStatusResponse);

  // Реконсиляция блокировки (pull): переживает потерю push-команды и ребут —
  // Task.lock едет РАЗ по Connect-стриму, сверки нет, поэтому после рестарта
  // агента desired-состояние сервера может разойтись с локальным lock.json.
  // Агент периодически сверяет их (как FetchAdminStatus).
  rpc FetchLockStatus(FetchLockStatusRequest) returns (FetchLockStatusResponse);

  // Эскроу recovery-ключа FileVault (enterprise). СИНХРОННЫЙ: stored=true ТОЛЬКО
  // после устойчивого сохранения. Реальная ошибка (Unavailable/FailedPrecondition) —
  // агент ретраит и НЕ запускает деструктив, если escrow не подтверждён. НЕ через outbox.
  rpc EscrowRecoveryKey(EscrowRecoveryKeyRequest) returns (EscrowRecoveryKeyResponse);

  // Удалённый рабочий стол. Отдельный bidi-стрим (НЕ смешивать с Connect, ADR-5):
  // открывает АГЕНТ-ХЕЛПЕР из интерактивной сессии после START-команды. Вверх —
  // кадры экрана (RDVideoFrame) и статусы; вниз — события ввода и управление.
  // Сервер проксирует поток в WebSocket админ-браузера. См. docs/remote-desktop-design.md.
  rpc RemoteDesktop(stream RemoteDesktopClientMsg) returns (stream RemoteDesktopServerMsg);

  // Телеметрия устройств. Агент собирает по таймеру и репортит (как inventory).
  // Метрики ресурсов — батчами; app-usage — суточные дельты (только при включённом
  // сборе); FetchTelemetryConfig — pull privacy-флага app-usage (как FetchPolicy).
  rpc ReportResourceMetrics(ResourceMetricsReport) returns (ResourceMetricsAck);
  rpc ReportAppUsage(AppUsageReport) returns (AppUsageAck);
  rpc FetchTelemetryConfig(FetchTelemetryConfigRequest) returns (FetchTelemetryConfigResponse);
}

// ====== Удалённый рабочий стол ======
// Сообщения bidi-стрима RemoteDesktop. oneof допустим (это новый контракт; buf
// breaking следит лишь за обратной совместимостью). Изображение кадра едет как
// bytes (никакого base64 на проводе). Координаты ввода — нормализованные 0..1,
// чтобы не зависеть от масштаба/ресайза кадра между агентом и браузером.

enum RDImageFormat {
  RD_IMAGE_FORMAT_UNSPECIFIED = 0;
  RD_IMAGE_FORMAT_JPEG        = 1;
}

// Агент-хелпер → Сервер.
message RemoteDesktopClientMsg {
  oneof payload {
    RDHello      hello  = 1; // ПЕРВЫМ сообщением: связывание по session_id
    RDVideoFrame frame  = 2; // кадр экрана
    RDStatus     status = 3; // статус/ошибка (готов, пользователь отклонил и т.п.)
  }
}
message RDHello {
  string session_id    = 1; // тот, что выдал сервер в RemoteDesktopCommand
  int32  screen_width  = 2; // размер виртуального экрана источника
  int32  screen_height = 3;
}
message RDVideoFrame {
  int64         seq        = 1;
  int64         ts_unix_ms = 2;
  RDImageFormat format     = 3; // MVP: JPEG
  int32         width      = 4; // размер этого кадра (может быть уменьшен относительно экрана)
  int32         height     = 5;
  bytes         data       = 6; // полный кадр (MVP); тайлы/дельты — позже
  bool          key_frame  = 7;
}
enum RDStatusCode {
  RD_STATUS_CODE_UNSPECIFIED = 0;
  RD_STATUS_CODE_READY       = 1;
  RD_STATUS_CODE_USER_DENIED = 2; // пользователь отклонил согласие
  RD_STATUS_CODE_ERROR       = 3;
}
message RDStatus {
  RDStatusCode code    = 1;
  string       message = 2;
}

// Сервер → Агент-хелпер.
message RemoteDesktopServerMsg {
  oneof payload {
    RDInputEvent input   = 1; // мышь/клавиатура (этап 2)
    RDControl    control = 2; // STOP / смена качества
  }
}
enum RDInputType {
  RD_INPUT_TYPE_UNSPECIFIED = 0;
  RD_INPUT_TYPE_MOUSE_MOVE  = 1;
  RD_INPUT_TYPE_MOUSE_DOWN  = 2;
  RD_INPUT_TYPE_MOUSE_UP    = 3;
  RD_INPUT_TYPE_WHEEL       = 4;
  RD_INPUT_TYPE_KEY         = 5;
}
message RDInputEvent {
  RDInputType type        = 1;
  double      x           = 2; // мышь: нормализованные 0..1 по виртуальному экрану
  double      y           = 3;
  int32       button      = 4; // 0=left, 1=right, 2=middle
  int32       wheel_delta = 5;
  int32       key_code    = 6; // Windows virtual-key
  bool        key_down    = 7;
  bool        ctrl        = 8;
  bool        alt         = 9;
  bool        shift       = 10;
  bool        meta        = 11;
}
enum RDControlAction {
  RD_CONTROL_ACTION_UNSPECIFIED = 0;
  RD_CONTROL_ACTION_STOP        = 1;
  RD_CONTROL_ACTION_SET_QUALITY = 2;
}
message RDControl {
  RDControlAction action  = 1;
  int32           fps     = 2;
  int32           quality = 3;
}

// Агент → Сервер: подтверждение применения/снятия блокировки (для аудита и UI).
message ReportLockStatusRequest {
  string    request_id  = 1;
  LockState state       = 2;
  int64     occurred_at = 3; // unix
  string    details     = 4;
}
enum LockState {
  LOCK_STATE_UNSPECIFIED       = 0;
  LOCK_STATE_LOCKED            = 1; // overlay: окно; filevault: ПОДТВЕРЖДЁН после ребута
  LOCK_STATE_UNLOCKED          = 2; // снят (сервером или верным паролем)
  LOCK_STATE_FILEVAULT_REVOKED = 3; // filevault: токен снят + PRK заэскроен; РЕБУТ НУЖЕН; ещё НЕ эффективен
  LOCK_STATE_FILEVAULT_REVOKE_FAILED = 4; // filevault: revoke НЕ завершён (partial/ABORT/misbuild) — деструктив мог частично примениться; требует ручного разбора IT; desired НЕ трогать
}

// LockMode — режим блокировки. FAIL-SAFE: 0 НИКОГДА не FILEVAULT.
// Агент трактует 0/unknown как OVERLAY; деструктив (revoke Secure Token) требует
// ЯВНОГО значения 2. LockState (actual) не трогаем — это ОТДЕЛЬНАЯ ось (режим vs состояние).
enum LockMode {
  LOCK_MODE_UNSPECIFIED = 0; // == OVERLAY (легаси/безопасный дефолт)
  LOCK_MODE_OVERLAY     = 1; // текущее полноэкранное окно
  LOCK_MODE_FILEVAULT   = 2; // ДЕСТРУКТИВ: revoke Secure Token → после ребута том закрыт
}
message ReportLockStatusResponse {
  bool received = 1;
}

// Агент → Сервер: узнать ЖЕЛАЕМОЕ состояние блокировки устройства (pull,
// реконсиляция). password_hash — bcrypt-хеш пароля разблокировки; уникален на
// каждую блокировку (сервер генерирует новый случайный пароль при каждом lock),
// поэтому агент использует его и как идентичность конкретного лок-инстанса
// (сверка "это тот же лок, что уже применён/только что снят локально"), и как
// request_id для Manager.Lock — отдельного поля не заводим.
message FetchLockStatusRequest {}
message FetchLockStatusResponse {
  bool   locked        = 1;
  string password_hash = 2; // bcrypt; непусто только при locked=true
  string reason        = 3; // текст для сотрудника на экране замка; только при locked=true
  // reconcile-путь FileVault: без этих полей потерянный push тихо
  // деградировал бы в оверлей. lock_mode=0 => OVERLAY (fail-safe).
  LockMode        lock_mode              = 4;
  // ADVISORY: серверного хранилища списка сейчас нет — сервер всегда шлёт ПУСТО.
  // Пусто => целевых пользователей определяет агент (семантика = LockCommand).
  // Непустой список — опциональный таргетинг будущего (потребует миграцию + wiring).
  repeated string filevault_target_users = 5;
}
